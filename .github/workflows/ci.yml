name: CI

on:
  push:
    branches: ["main", "T-*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: ev_motor_sim

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install package with dev extras; skip PyQt6 for headless CI
          pip install numpy scipy pydantic>=2 pytest>=8 pytest-cov
          pip install --no-deps -e .

      - name: Run pytest with coverage
        run: |
          pytest --cov --cov-report=term-missing --cov-report=xml \
            -m "not validation" \
            --ignore=tests/test_reference_presets.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-xml
          path: ev_motor_sim/coverage.xml

  validation:
    name: Reference preset validation
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ev_motor_sim

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pydantic>=2 pytest>=8
          pip install --no-deps -e .

      - name: Run validation tests
        run: |
          pytest -m validation -v tests/test_reference_presets.py
